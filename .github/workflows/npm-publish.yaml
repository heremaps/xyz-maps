name: NPM Publish

on:
    push:
        branches:
            - "oidc-publish-test"
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+*"
    workflow_dispatch:
env:
    yarn-network-timeout: 1000000

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            -   uses: actions/checkout@v2
            -   name: Get yarn cache directory path
                id: yarn-cache-dir-path
                run: echo "::set-output name=dir::$(yarn cache dir)"
            -   uses: actions/cache@v4
                id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
                with:
                    path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
                    key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-yarn-
            -   name: Setup Node.js
                uses: actions/setup-node@v3
                with:
                    node-version: '22'
                    registry-url: 'https://registry.npmjs.org'
            -   name: Install dependencies
                run: yarn install --network-timeout ${{ env.yarn-network-timeout }}
            -   name: Build release
                run: yarn run build-release
            -   name: Verify write access via OIDC dry-run (no publish)
                run: |
                  declare -A packages=(
                      ["@here/xyz-maps-common"]="packages/xyz-maps-common"
                      ["@here/xyz-maps-core"]="packages/xyz-maps-core"
                      ["@here/xyz-maps-display"]="packages/xyz-maps-display"
                      ["@here/xyz-maps-editor"]="packages/xyz-maps-editor"
                  )
                
                  for pkg in "${!packages[@]}"
                  do
                      echo "Checking OIDC auth and write permissions for $pkg..."
                      (cd "${packages[$pkg]}" && npm publish --dry-run) || {
                          echo "::error::Authentication or write permission check failed for $pkg";
                          exit 1;
                      }
                      echo "✓ Success: OIDC verification passed for $pkg"
                  done
