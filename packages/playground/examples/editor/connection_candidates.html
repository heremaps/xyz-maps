<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=no">
		<title>XYZ Maps Example: Connection Candidates</title>
		<style type="text/css">
			#map {
				position: absolute;
            	overflow: hidden;
				top: 0;
				left: 0;
				width: 100%;
                height: 100%;
			}
            #info {
                position: absolute;
                top: 12px;
                left: 12px;
                padding: 8px 12px;
                background: rgba(0,0,0,0.7);
                color: #fff;
                font-family: sans-serif;
                font-size: 13px;
                border-radius: 4px;
                pointer-events: none;
                z-index: 1;
                max-width: 460px;
            }
            #candidateList {
                position: absolute;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                font-family: sans-serif;
                font-size: 13px;
                display: none;
                z-index: 2;
            }
            #candidateList div {
                padding: 8px 16px;
                cursor: pointer;
                white-space: nowrap;
            }
            #candidateList div:hover {
                background: #e0e0e0;
            }
		</style>
	</head>
	<body>
		<div id="map"></div>
        <div id="info">Drag the green "On-Ramp" endpoint down onto the overlapping highway/overpass. A picker will appear to choose which road to connect to.</div>
        <div id="candidateList"></div>
	</body>
</html>
